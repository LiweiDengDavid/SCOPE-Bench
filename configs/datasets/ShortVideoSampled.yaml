interaction_file: "inter.csv"
field_separator: ","
USER_ID_FIELD: "userID"
ITEM_ID_FIELD: "itemID"
inter_splitting_label: "split_label"
TIME_FIELD: "timestamp"
features:
  vision_feature_file: "image_features.npy"
  text_feature_file: "text_features.npy"
  visual_dim: 256
  text_dim: 384

# Add A-LCDS@K and E-LCDS@K to the same result dictionary/CSV as the ranking
# metrics. K is taken directly from evaluation.topk.
lcds:
  enabled: true

# HPO-tuned defaults for this dataset. These are applied only when the selected
# model matches the key below, after the model YAML and shared dataset settings.
model_overrides:
  # complete=500/500, best_trial=363, best_valid_NDCG@10=0.014059
