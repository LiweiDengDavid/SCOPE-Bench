is_federated: false
is_multimodal_model: true
is_sequential: false

embedding_size: 64
num_layers: 3 # Number of GCN layers
dropout_rate: 0.1
diffusion:
  enable_diffusion: true # Enable diffusion functionality
  noise_min: 0.0001 # Beta start for noise schedule
  noise_max: 0.02 # Beta end for noise schedule
  num_steps: 1000
  beta_schedule: "linear"
  hidden_dims: [512, 256, 128] # Denoising network hidden layer dimensions
  time_embed_dim: 64 # Time embedding dimension for denoising network
contrastive_learning:
  temperature: 0.1 # Temperature parameter (default value)
  contrastive_method: 1 # Contrastive method type
  augmentation:
    dropout_rate: 0.1
    noise_scale: 0.1
    masking_rate: 0.2
    mix_up_alpha: 0.2
    augment_dropout_prob: 0.7
    augment_noise_prob: 0.6
    augment_mask_prob: 0.4
    mining_ratio: 0.5
multimodal:
  use_text: true
  use_image: true
  use_audio: false
  modal_fusion_weights:
    learnable: true
    init_equal: true
    normalization: true
  user_aggregation:
    type: "mean"
    use_attention: false
loss_weights:
  main_loss: 1.0 # Main recommendation loss weight
  ssl_loss: 0.1 # SSL loss weight (default value)
  diffusion_loss: 0.01 # Diffusion loss weight (default value)

learning_rate: 0.001
weight_decay: 0.0001

hyper_parameters: ["learning_rate", "weight_decay", "loss_weights.ssl_loss", "loss_weights.diffusion_loss", "contrastive_learning.temperature", "num_layers", "dropout_rate"]
parameter_space:
  learning_rate:
    type: "loguniform"
    low: 1.0e-5
    high: 1.0e-1
  weight_decay:
    type: "loguniform"
    low: 1.0e-8
    high: 1.0e-3
  loss_weights.ssl_loss:
    type: "choice"
    values: [0.01, 0.1, 0.5]

  loss_weights.diffusion_loss:
    type: "choice"
    values: [0.001, 0.01, 0.1]

  contrastive_learning.temperature:
    type: "choice"
    values: [0.1, 0.2, 0.3]
  num_layers:
    type: "choice"
    values: [1, 2, 3, 4, 5]
  dropout_rate:
    type: "uniform"
    low: 0.0
    high: 0.5
