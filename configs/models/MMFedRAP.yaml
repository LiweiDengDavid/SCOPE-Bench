is_federated: true
is_multimodal_model: true
is_sequential: false
learning_rate_scheduler: null

embedding_size: 512
feature_embedding_size: 64
fusion_method: 'moe' # 'moe', 'sum', 'attention', 'mlp', 'gate'
alpha: 1e-4
beta: 1e-2
loss_warmup_rounds: 10 # rounds over which independency/reg loss weight warms up (tanh)
head_stability_weight: 0.0
head_stability_head_quantile: 0.8

optimizer: 'sgd'
learning_rate: 0.01
weight_decay: 0.00001
decay_rate: 0.97

hyper_parameters: ["alpha", "beta", "learning_rate", "weight_decay", "decay_rate"]
parameter_space:
  alpha:
    type: "loguniform"
    low: 1.0e-5
    high: 1.0e-1
  beta:
    type: "loguniform"
    low: 1.0e-5
    high: 1.0e-1
  learning_rate:
    type: "loguniform"
    low: 1.0e-5
    high: 1.0e-1
  weight_decay:
    type: "loguniform"
    low: 1.0e-8
    high: 1.0e-3
  decay_rate:
    type: "uniform"
    low: 0.90
    high: 0.99
