is_federated: false
is_multimodal_model: true
is_sequential: false

embedding_size: 64

learning_rate: 0.1
weight_decay: 0.0 # optimizer L2 only
reg_weight: 0.0001 # manual embedding-L2 coefficient, decoupled from optimizer weight_decay
hyper_parameters: ["learning_rate", "reg_weight"]
parameter_space:
  learning_rate:
    type: "loguniform"
    low: 1.0e-5
    high: 1.0e-1
  reg_weight:
    type: "loguniform"
    low: 1.0e-8
    high: 1.0e-3
