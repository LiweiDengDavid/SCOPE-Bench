is_federated: false
is_multimodal_model: false
is_sequential: false

embedding_size: 64            # Embedding dimension search range
learning_rate: 0.0001                # Learning rate search range
weight_decay: '1e-05'                  # Weight decay search range

hyper_parameters: ["embedding_size", "learning_rate", "weight_decay"]

optimization:
  strategy: "bayesian"
  budget: 100

parameter_space:
  learning_rate:
    type: "loguniform"
    low: 1.0e-5
    high: 1.0e-1
  embedding_size:
    type: "choice"
    values: [32, 64, 128, 256, 512]
  weight_decay:
    type: "loguniform"
    low: 1.0e-8
    high: 1.0e-3
